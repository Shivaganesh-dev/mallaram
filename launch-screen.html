<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mallaram Village Official Website Launch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #14532d;
      --primary-light: #166534;
      --accent: #b45309;
      --gold: #d4af37;
      --cream: #fdfbf7;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--primary);
    }

    /* Traditional Rangoli Background Pattern */
    .rangoli-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.05;
    }

    .rangoli-pattern {
      position: absolute;
      width: 400px;
      height: 400px;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 50 L100 0 L100 100 Z' fill='%2314532d' opacity='0.5'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%2314532d'/%3E%3Cpath d='M50 50 L0 0 L0 100 Z' fill='%2314532d' opacity='0.5'/%3E%3C/svg%3E");
      background-size: contain;
      filter: blur(2px);
    }

    .rangoli-tl { top: -100px; left: -100px; rotate: 45deg; }
    .rangoli-tr { top: -100px; right: -100px; rotate: 135deg; }
    .rangoli-bl { bottom: -100px; left: -100px; rotate: -45deg; }
    .rangoli-br { bottom: -100px; right: -100px; rotate: -135deg; }

    /* Grand Decorative Border */
    .decorative-frame {
      position: fixed;
      inset: 20px;
      border: 2px solid rgba(20, 83, 45, 0.1);
      pointer-events: none;
      z-index: 50;
    }

    .decorative-corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 4px solid var(--accent);
    }

    .c-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
    .c-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
    .c-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
    .c-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

    /* Main Container */
    .container {
      text-align: center;
      z-index: 10;
      padding: 2rem;
      max-width: 1000px;
      width: 100%;
    }

    /* Logo Styling */
    .logo-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 3rem;
    }

    .logo-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: var(--white);
      padding: 15px;
      box-shadow: 0 15px 50px rgba(20, 83, 45, 0.1);
      border: 1px solid rgba(20, 83, 45, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .gov-text {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.4em;
    }

    /* Content Styling */
    .village-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 700;
      font-style: italic;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .tagline-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .tagline-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
    }

    .tagline {
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8em;
      color: var(--accent);
    }

    .mla-announcement {
      margin-bottom: 4rem;
      display: inline-flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .launched-by {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--primary-light);
      font-weight: 600;
    }

    .mla-name {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      position: relative;
      display: inline-block;
      padding: 0.5rem 2rem;
    }

    .mla-name::before, .mla-name::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30px;
      height: 1px;
      background: var(--gold);
    }

    .mla-name::before { left: -20px; }
    .mla-name::after { right: -20px; }

    .launch-btn {
      padding: 1.4rem 5rem;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--white);
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 40px rgba(20, 83, 45, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.25em;
    }

    .launch-btn:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 20px 50px rgba(20, 83, 45, 0.4);
    }

    .launch-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Countdown Styling */
    .countdown-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .countdown-screen.active {
      opacity: 1;
    }

    .countdown-number {
      font-size: clamp(10rem, 30vw, 20rem);
      font-weight: 900;
      color: var(--primary);
      text-shadow: 0 0 30px rgba(20, 83, 45, 0.2);
      animation: countdownPulse 1s ease-in-out;
    }

    @keyframes countdownPulse {
      0% { opacity: 0; transform: scale(0.5); }
      50% { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Live Screen Styling */
    .live-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      text-align: center;
      width: 100%;
    }

    .live-screen.active {
      opacity: 1;
    }

    .live-message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .live-village {
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8em;
      color: var(--accent);
    }

    .live-status {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1.5rem;
      background: #ef4444;
      color: white;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      animation: blink 1s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .initial-screen {
      transition: all 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    .initial-screen.hidden {
      opacity: 0;
      transform: scale(0.9) translateY(-30px);
      filter: blur(10px);
      pointer-events: none;
    }
  </style>
</head>

    </div>

  <script>
    // Configuration
    const REDIRECT_URL = 'https://www.mallaramgramapanchayat.com/en';
    const COUNTDOWN_DURATION = 1000;
    const LIVE_DISPLAY_DURATION = 3500;

    // DOM Elements
    const initialScreen = document.getElementById('initialScreen');
    const countdownScreen = document.getElementById('countdownScreen');
    const countdownNumber = document.getElementById('countdownNumber');
    const liveScreen = document.getElementById('liveScreen');
    const launchBtn = document.getElementById('launchBtn');

    function startLaunchSequence() {
      launchBtn.disabled = true;
      launchBtn.style.opacity = '0.6';
      launchBtn.style.transform = 'scale(0.95)';

      // Fullscreen attempt
      try {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      } catch (e) {}

      initialScreen.classList.add('hidden');

      setTimeout(() => {
        startCountdown();
      }, 800);
    }

    function startCountdown() {
      countdownScreen.classList.add('active');
      let count = 3;

      function updateCountdown() {
        if (count > 0) {
          countdownNumber.textContent = count;
          countdownNumber.style.animation = 'none';
          countdownNumber.offsetHeight;
          countdownNumber.style.animation = '';
          count--;
          setTimeout(updateCountdown, COUNTDOWN_DURATION);
        } else {
          setTimeout(() => {
            showLiveMessage();
          }, COUNTDOWN_DURATION);
        }
      }

      updateCountdown();
    }

    function showLiveMessage() {
      countdownScreen.classList.remove('active');
      liveScreen.classList.add('active');

      setTimeout(() => {
        redirectToSite();
      }, LIVE_DISPLAY_DURATION);
    }

    function redirectToSite() {
      try {
        if (document.exitFullscreen && document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
        }
      } catch (e) {}
      window.location.href = REDIRECT_URL;
    }

    launchBtn.addEventListener('click', startLaunchSequence);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !initialScreen.classList.contains('hidden')) {
        startLaunchSequence();
      }
    });
  </script>
